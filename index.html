<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProposaAI | Professional AI Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* --- Landing Page --- */
        #landing-page { height: 100vh; overflow-y: auto; background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; position: sticky; top: 0; z-index: 100;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); }

        /* --- Auth Modal --- */
        #auth-modal { 
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(12px); display: none; justify-content: center; 
            align-items: center; z-index: 9999; 
        }
        .auth-card { 
            background: #1e293b; border: 2px solid var(--primary); 
            padding: 40px; border-radius: 24px; width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        /* --- Dashboard Layout --- */
        #main-dashboard { display: none; height: 100vh; width: 100vw; }
        .db-container { display: flex; height: 100%; }
        
        .sidebar { 
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); 
            padding: 25px; display: flex; flex-direction: column; 
        }
        .content-area { flex-grow: 1; display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 20px; height: 100vh; }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* --- Scroll Areas --- */
        #output, #chat-display { flex-grow: 1; overflow-y: auto; margin-top: 15px; padding-right: 10px; }
        
        /* Formatting UI */
        h3 { color: var(--primary); margin: 22px 0 10px; font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        li { margin-left: 20px; margin-bottom: 8px; color: #cbd5e1; line-height: 1.6; }
        strong { color: #fff; }

        .btn-main { background: var(--primary); color: white; padding: 14px 25px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(16,185,129,0.2); }
        
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        /* Chat Bubbles */
        .msg { padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.9rem; max-width: 85%; line-height: 1.5; }
        .ai-msg { background: rgba(255,255,255,0.05); align-self: flex-start; border: 1px solid var(--border); }
        .user-msg { background: #3b82f6; align-self: flex-end; margin-left: auto; color: white; }

        /* Input Fix with Gaps */
        input, textarea { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 12px; color: white; margin-bottom: 20px !important; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        .history-item { padding: 12px; background: var(--glass); border-radius: 10px; margin-bottom: 10px; cursor: pointer; font-size: 0.85rem; border: 1px solid transparent; transition: 0.2s; }
        .history-item:hover { border-color: var(--primary); background: rgba(16,185,129,0.05); }

        /* Error Message Style */
        .error-box { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 77, 77, 0.2); margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="landing-page">
        <nav>
            <div style="font-size: 1.6rem; font-weight: 800; color: var(--primary); letter-spacing: -1px;">ProposaAI</div>
            <button class="btn-main" onclick="showLogin()" style="padding: 10px 25px;">Login</button>
        </nav>
        <section class="hero">
            <h1 style="line-height: 1.1;">Create <span>Winning Proposals</span> <br>In Seconds.</h1>
            <p style="margin-bottom: 30px; opacity: 0.7; font-size: 1.1rem;">The ultimate AI workspace for professionals.</p>
            <button class="btn-main" onclick="showLogin()" style="padding: 18px 45px; font-size: 1.1rem;">Get Started for Free</button>
        </section>
    </div>

    <div id="auth-modal">
        <div class="auth-card">
            <h2 style="color: var(--primary); margin-bottom: 10px; font-size: 1.8rem;">Welcome Back</h2>
            <p style="opacity: 0.5; margin-bottom: 25px;">Sign in to access your dashboard</p>
            <input type="email" id="user-email" placeholder="Email Address">
            <input type="password" id="user-pass" placeholder="Password">
            <button class="btn-main" onclick="enterDashboard()" style="width: 100%; margin-top: 10px;">Enter Dashboard</button>
            <p style="margin-top: 20px; font-size: 0.85rem; cursor: pointer; opacity: 0.6;" onclick="hideLogin()">Cancel</p>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="db-container">
            <div class="sidebar">
                <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 35px;">ProposaAI</div>
                <p style="font-size: 0.75rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Recent Projects</p>
                <div id="history-list" style="flex-grow: 1; overflow-y: auto;"></div>
                
                <button class="btn-outline" onclick="startNew()" style="font-weight: 700;">+ New Project</button>
                <button class="btn-outline" onclick="location.reload()" style="margin-top: 20px; opacity: 0.6;">Logout</button>
            </div>

            <div class="content-area">
                <div class="card">
                    <h2 style="margin-bottom: 20px; font-size: 1.5rem;">✨ Proposal Generator</h2>
                    <input type="text" id="p-title" placeholder="Project Title (e.g. Mobile App Development)">
                    <textarea id="p-desc" rows="4" placeholder="Briefly describe the project goals and requirements..."></textarea>
                    <button class="btn-main" onclick="generate()">Generate Professional Draft</button>
                    <div id="output">Draft will appear here...</div>
                </div>

                <div class="card">
                    <h2 style="margin-bottom: 20px; font-size: 1.5rem;">💬 AI Consultant</h2>
                    <div id="chat-display" style="display: flex; flex-direction: column;"></div>
                    <div style="display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 15px;">
                        <input type="text" id="chat-input" placeholder="Ask AI for advice..." style="margin:0 !important;">
                        <button onclick="sendChat()" class="btn-main" style="padding: 0 20px;">OK</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let historyData = [];

        function showLogin() { document.getElementById('auth-modal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('auth-modal').style.display = 'none'; }

        // Login Logic with Password Check
        function enterDashboard() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;

            if(!email.includes('@')) {
                alert("Please enter a valid email address.");
                return;
            }
            if(pass.length < 4) {
                alert("Please enter a valid password (at least 4 characters).");
                return;
            }

            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
        }

        function formatText(text) {
            return text
                .replace(/### (.*?)\n/g, '<h3>$1</h3>') 
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') 
                .replace(/^\* (.*?)$/gm, '<li>$1</li>') 
                .replace(/\n/g, '<br>');
        }

        async function callAI(prompt, isChat = false) {
            try {
                const res = await fetch('http://localhost:3000/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, isChat })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (e) { return "❌ Error: Make sure your terminal is running 'node server.js'!"; }
        }

        async function generate() {
            const t = document.getElementById('p-title').value.trim();
            const d = document.getElementById('p-desc').value.trim();
            const outputDiv = document.getElementById('output');

            if (!t || !d) {
                outputDiv.innerHTML = `
                    <div class="error-box">
                        <strong>⚠️ Missing Information:</strong><br>
                        Please provide both a <b>Project Title</b> and a <b>Description</b> to generate a high-quality proposal.
                    </div>`;
                return; 
            }

            outputDiv.innerHTML = "<div style='padding: 20px; opacity: 0.6;'>✍️ AI Strategist is drafting your proposal...</div>";
            
            const res = await callAI(`Write a high-end professional business proposal for ${t}. Context: ${d}`, false);
            
            outputDiv.innerHTML = formatText(res);
            historyData.unshift({ t, content: res, d });
            updateHistory();
        }

        async function sendChat() {
            const inp = document.getElementById('chat-input');
            const disp = document.getElementById('chat-display');
            if(!inp.value.trim()) return;
            
            disp.innerHTML += `<div class="msg user-msg">${inp.value}</div>`;
            const userMsg = inp.value;
            inp.value = "";
            
            const res = await callAI(userMsg, true);
            disp.innerHTML += `<div class="msg ai-msg">${formatText(res)}</div>`;
            disp.scrollTop = disp.scrollHeight;
        }

        function updateHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = historyData.map((item, idx) => `
                <div class="history-item" onclick="loadProject(${idx})">
                    <strong>${item.t}</strong>
                </div>
            `).join('');
        }

        function loadProject(idx) {
            const item = historyData[idx];
            document.getElementById('p-title').value = item.t;
            document.getElementById('p-desc').value = item.d;
            document.getElementById('output').innerHTML = formatText(item.content);
        }

        function startNew() {
            document.getElementById('p-title').value = "";
            document.getElementById('p-desc').value = "";
            document.getElementById('output').innerHTML = "Draft will appear here...";
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });
    </script>
</body>
</html>
